<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% include head-custom.html %}
  </head>
  <script>
document.addEventListener("DOMContentLoaded", async () => {
  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
  const blocks = Array.from(document.querySelectorAll(".typewriter"));

  for (const block of blocks) {
    const original = block.innerHTML.trim();
    block.innerHTML = "";
    block.classList.add("ready", "typing-active");

    let output = "";
    let i = 0;

    while (i < original.length) {
      if (original[i] === "<") {
        const closeIndex = original.indexOf(">", i);
        if (closeIndex === -1) break;
        output += original.slice(i, closeIndex + 1);
        i = closeIndex + 1;
        block.innerHTML = output;
      } else {
        output += original[i];
        i += 1;
        block.innerHTML = output;
        await sleep(16);
      }
    }

    block.innerHTML = output;
    block.classList.remove("typing-active");
    await sleep(180);
  }
});
</script>
  <body>
    <div class="page-shell">
      <div class="wrapper">
        <header class="sidebar">
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="Dang Van Bao">
          {% endif %}

          <h1>{{ site.title }}</h1>

          <div class="site-description">
            {{ site.description }}
          </div>

          <div class="sidebar-footer">
            <p>© 2026 Dang Van Bao</p>
            <p>Research Portfolio · Machine Learning · Medical Imaging · Wearable Sensing</p>
          </div>
        </header>

        <section class="main-content">
          {{ content }}
        </section>
      </div>
    </div>
  </body>
</html>
